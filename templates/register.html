<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a member account on AI Link Guard to store and track your cyber link scan history.">
  <title>Register | AI Link Guard - BITSMIKRO 2026</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- 3D Canvas Background -->
  <canvas id="cyberCanvas3D"></canvas>

  <nav class="navbar navbar-expand-lg cyber-navbar sticky-top">
    <div class="container d-flex align-items-center justify-content-between flex-wrap">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="AI Link Guard Logo">
        <span>AI LINK GUARD</span>
      </a>
      
      <div class="d-flex align-items-center gap-3">
        <span id="active-device-badge" class="badge" style="font-size: 0.75rem; font-family: var(--font-mono); border: 1px solid rgba(0, 243, 255, 0.5); background: rgba(6, 11, 26, 0.8); vertical-align: middle;">
          <i class="bi bi-cpu"></i> Detecting...
        </span>
        <a href="/" class="btn btn-cyber-outline btn-sm">
          <i class="bi bi-arrow-left me-1"></i> Kembali
        </a>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        
        <div class="cyber-card p-4 p-md-5">
          <div class="text-center mb-4">
            <div class="fs-1 text-info mb-2"><i class="bi bi-person-plus-fill"></i></div>
            <h1 class="h3 text-white fw-bold">Member Account Register</h1>
            <p class="text-light small">Join AI Link Guard & Store Personal Link History</p>
          </div>

          <div id="regError" class="alert alert-danger d-none font-monospace small" role="alert"></div>

          <form id="registerForm">
            <div class="mb-3">
              <label for="regName" class="form-label text-light small font-monospace">FULL NAME</label>
              <input type="text" id="regName" class="cyber-input" placeholder="e.g. Budi Cyber Guard" required autocomplete="name">
            </div>

            <div class="mb-3">
              <label for="regEmail" class="form-label text-light small font-monospace">EMAIL ADDRESS</label>
              <input type="email" id="regEmail" class="cyber-input" placeholder="e.g. budi@bitsmikro.ac.id" required autocomplete="email">
            </div>

            <div class="mb-3">
              <label for="regUser" class="form-label text-light small font-monospace">CHOOSE USERNAME</label>
              <input type="text" id="regUser" class="cyber-input" placeholder="e.g. budi_cyber" required autocomplete="username">
            </div>

            <div class="mb-4">
              <label for="regPass" class="form-label text-light small font-monospace">CREATE PASSWORD</label>
              <input type="password" id="regPass" class="cyber-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required autocomplete="new-password">
            </div>

            <button type="submit" class="btn btn-cyber w-100 py-3 mb-3">
              <i class="bi bi-person-check-fill"></i> CREATE ACCOUNT & LOGIN
            </button>
          </form>

          <div class="text-center">
            <span class="text-light small">Already have an account?</span>
            <a href="/login" class="text-info fw-bold small ms-1">Login Here</a>
          </div>

        </div>

      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
