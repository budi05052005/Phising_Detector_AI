<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AI Link Guard - BITSMIKRO 2026</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- 3D Canvas Background -->
  <canvas id="cyberCanvas3D"></canvas>

  <nav class="navbar navbar-expand-lg cyber-navbar sticky-top">
    <div class="container d-flex align-items-center justify-content-between flex-wrap">
      <a class="navbar-brand d-flex align-items-center gap-2" href="/">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="AI Link Guard Logo">
        <span>AI LINK GUARD</span>
      </a>
      
      <div class="d-flex align-items-center gap-3">
        <span id="active-device-badge" class="badge" style="font-size: 0.75rem; font-family: var(--font-mono); border: 1px solid rgba(0, 243, 255, 0.5); background: rgba(6, 11, 26, 0.8); vertical-align: middle;">
          <i class="bi bi-cpu"></i> Detecting...
        </span>
        <a href="/" class="btn btn-cyber-outline btn-sm">
          <i class="bi bi-arrow-left me-1"></i> Kembali
        </a>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        
        <div class="cyber-card p-4 p-md-5">
          <div class="text-center mb-4">
            <div class="fs-1 text-info mb-2"><i class="bi bi-shield-lock-fill"></i></div>
            <h1 class="h3 text-white fw-bold">Cyber Security Login</h1>
            <p class="text-light small">Access Member Personal History or System Admin Portal</p>
          </div>

          <div id="loginError" class="alert alert-danger d-none font-monospace small" role="alert"></div>

          <form id="loginForm">
            <div class="mb-3">
              <label for="loginUser" class="form-label text-light small font-monospace">USERNAME</label>
              <input type="text" id="loginUser" class="cyber-input" placeholder="e.g. admin or member1" required autocomplete="username">
            </div>

            <div class="mb-4">
              <label for="loginPass" class="form-label text-light small font-monospace">PASSWORD</label>
              <input type="password" id="loginPass" class="cyber-input" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-cyber w-100 py-3 mb-3">
              <i class="bi bi-box-arrow-in-right"></i> AUTHENTICATE & LOGIN
            </button>
          </form>

          <div class="metric-box p-3 mb-3 small text-light">
            <div class="text-info fw-bold mb-1"><i class="bi bi-info-circle me-1"></i> Default Account Credentials:</div>
            <div class="font-monospace">Admin: <span class="text-info">admin</span> / <span class="text-info">admin123</span></div>
            <div class="font-monospace">Member: <span class="text-info">member1</span> / <span class="text-info">user123</span></div>
          </div>

          <div class="text-center">
            <span class="text-light small">Don't have an account?</span>
            <a href="/register" class="text-info fw-bold small ms-1">Register as Member</a>
          </div>

        </div>

      </div>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
